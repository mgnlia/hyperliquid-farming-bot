name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff
      - run: ruff check backend/ --line-length 120 --ignore E501,E402,F401
        working-directory: hyperliquid-bot
        continue-on-error: false

  typecheck-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: hyperliquid-bot/frontend/package-lock.json
      - run: npm ci
        working-directory: hyperliquid-bot/frontend
      - run: npm run build
        working-directory: hyperliquid-bot/frontend
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
