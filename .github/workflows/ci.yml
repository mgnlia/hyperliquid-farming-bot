name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Create venv and install deps
        run: |
          uv venv .venv
          uv pip install --python .venv/bin/python \
            fastapi uvicorn httpx sse-starlette \
            pydantic pydantic-settings \
            aiosqlite sqlalchemy \
            eth-account \
            ruff pytest pytest-asyncio

      - name: Lint (ruff)
        run: .venv/bin/python -m ruff check src/ tests/

      - name: Run tests
        run: PYTHONPATH=. .venv/bin/python -m pytest tests/ -v

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci || npm install

      - name: Typecheck
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
